{% extends "base.html" %}

{% block title %}找到你记忆中的物品{% endblock %}

{% block content %}
  <div class="card" style="padding:0;overflow:hidden;">
    <div style="padding:var(--s6) var(--s6) var(--s4);">
      <h1>找到和你记忆中最相近的物品</h1>
      <p>分别拖动 X 轴和 Y 轴上的蓝点，找到你记忆中的图像，然后确认</p>
    </div>
    <div id="coord-wrap">
      <div id="left-col">
        <div id="y-rail"><div id="y-dot"></div></div>
        <div id="origin"></div>
      </div>
      <div id="main-col">
        <div id="quadrant">
          <img id="preview-img" alt="">
        </div>
        <div id="x-rail"><div id="x-dot"></div></div>
      </div>
    </div>
    <div style="padding:var(--s4) var(--s6) var(--s6);">
      <button id="confirm-btn" class="btn" style="width:100%;" disabled>确认选择</button>
    </div>
  </div>

  <div id="phase-data"
       data-phase="{{ phase }}"
       data-x-order="{{ x_order | tojson }}"
       data-y-order="{{ y_order | tojson }}"
       data-avail-cats='{{ avail_cats | tojson }}'
       data-avail-mats='{{ avail_mats | tojson }}'
       style="display:none"></div>
  <script src="/static/grid.js"></script>
{% endblock %}
