{% extends "base.html" %}

{% block title %}找到你记忆中的物品{% endblock %}

{% block content %}
  <div class="card">
    <h1>找到你记忆中的物品</h1>
    <p>点击你认为是原始图像的格子</p>
  </div>

  <div id="grid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:var(--s6);"></div>

  <div class="card" style="margin-bottom:var(--s6);min-height:120px;display:flex;align-items:center;justify-content:center;">
    <img id="preview-img" alt="预览图像" style="max-width:100%;max-height:240px;border-radius:var(--r-sm);display:none;">
  </div>

  <button id="confirm-btn" class="btn" style="width:100%" disabled>确认选择</button>
  <div id="phase-data" data-phase="{{ phase }}" style="display:none"></div>
  <script src="/static/grid.js"></script>
{% endblock %}
