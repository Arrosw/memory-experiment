{% extends "base.html" %}

{% block title %}本阶段已完成{% endblock %}

{% block content %}
  <div class="card text-center">
    <div style="font-size:64px;text-align:center;margin-bottom:var(--s6);">✓</div>
    <h1>本阶段已完成</h1>
    <p>你的参与码：</p>
    <div style="font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;font-size:20px;padding:14px 16px;border:1px solid var(--separator);border-radius:var(--r-sm);background:var(--bg);margin-bottom:var(--s4);user-select:all;">
      {{ code }}
    </div>
    {% if phase != 'month' %}
      <p>请保存此码，{{ next_date }} 后凭码返回</p>
    {% endif %}
    <button class="btn" type="button" id="copy-btn" onclick="copyCode()">复制参与码</button>
    <script>
    function copyCode() {
      var code = {{ code|tojson }};
      var btn = document.getElementById('copy-btn');
      function showResult(ok) {
        btn.textContent = ok ? '已复制 ✓' : '复制失败，请手动复制';
        btn.disabled = true;
        setTimeout(function() { btn.textContent = '复制参与码'; btn.disabled = false; }, 2000);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(code).then(function() { showResult(true); }).catch(function() { fallback(code, showResult); });
      } else {
        fallback(code, showResult);
      }
    }
    function fallback(text, cb) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      var ok = false;
      try { ok = document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(ta);
      cb(ok);
    }
    </script>
    <div class="mt-6">
      <a href="/" class="text-secondary" style="text-decoration:none;">回首页</a>
    </div>
  </div>
{% endblock %}
